<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpaencasaLindaMuñoz - Peluquería Canina</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons (for mobile-friendly thick icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/phosphor-icons@1.4.2/src/css/icons.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>

<body>
    <!-- App Container -->
    <div id="app-container">

        <!-- Header -->
        <header class="app-header header-flex">
            <h1 id="header-title">SpaencasaLindaMuñoz</h1>

            <button onclick="app.logout()" class="btn-icon logout">
                <i class="ph ph-sign-out"></i>
            </button>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">

            <!-- Dashboard View -->
            <section id="view-dashboard" class="view">
                <div class="dashboard-grid">
                    <div class="stat-card">
                        <i class="ph ph-users stat-icon"></i>
                        <h3 id="stat-clients">...</h3>
                        <p>Total Clientes</p>
                    </div>
                    <div class="stat-card" id="card-today">
                        <i class="ph ph-calendar-check stat-icon"></i>
                        <h3 id="stat-appointments">...</h3>
                        <p>Citas de Hoy</p>
                    </div>
                    <div class="stat-card" id="card-upcoming">
                        <i class="ph ph-calendar-plus stat-icon"></i>
                        <h3 id="stat-upcoming">--</h3>
                        <p>Próximas Citas</p>
                    </div>
                    <div class="stat-card stat-income">
                        <i class="ph ph-trend-up stat-icon"></i>
                        <h3 id="stat-income">$...</h3>
                        <p>Ingresos Mes</p>
                    </div>
                    <div class="stat-card stat-expense">
                        <i class="ph ph-trend-down stat-icon"></i>
                        <h3 id="stat-expenses">$...</h3>
                        <p>Gastos Mes</p>
                    </div>
                    <div class="stat-card">
                        <i class="ph ph-currency-dollar stat-icon"></i>
                        <h3 id="stat-profit">$...</h3>
                        <p>Ganancia Mes</p>
                    </div>
                </div>
            </section>

            <!-- Clients View -->
            <section id="view-clients" class="view">
                <div class="view-header">
                    <h2>Clientes</h2>
                    <button class="btn-primary" onclick="app.showModal('modal-client')"><i class="ph ph-plus"></i>
                        Nuevo</button>
                </div>
                <div id="clients-list" class="list-container">
                    <!-- Client Cards dynamically inserted here -->
                </div>
            </section>

            <div id="view-calendar" class="view">
                <div id="calendar"></div>
            </div>

            <!-- Appointments View -->
            <section id="view-appointments" class="view">
                <div class="view-header">
                    <h2>Citas</h2>
                    <button class="btn-primary" onclick="app.showModal('modal-appointment')"><i class="ph ph-plus"></i>
                        Nueva</button>
                </div>
                <div id="appointments-list" class="list-container">
                    <!-- Appointment Cards dynamically inserted here -->
                </div>
            </section>

            <!-- Finances View -->
            <section id="view-finances" class="view">
                <div class="view-header">
                    <h2>Finanzas</h2>
                    <button class="btn-primary" onclick="app.showModal('modal-finance')"><i class="ph ph-plus"></i>
                        Registro</button>
                </div>
                <div id="finances-list" class="list-container">
                    <!-- Finance Cards dynamically inserted here -->
                </div>
            </section>

            <section id="view-login" class="view login-view">
                <div class="login-container">
                    <img src="logo.png" class="login-logo" alt="Logo">
                    <h1 class="login-title">SpaencasaLindaMuñoz</h1>
                    <input id="login-user" placeholder="Usuario">
                    <input id="login-pass" type="password" placeholder="Contraseña">
                    <button onclick="app.login()" class="login-btn">Ingresar</button>
                </div>
            </section>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="dashboard">
                <i class="ph ph-house"></i>
                <span>Inicio</span>
            </button>
            <button class="nav-item" data-target="clients">
                <i class="ph ph-paw-print"></i>
                <span>Clientes</span>
            </button>
            <button class="nav-item" data-target="appointments">
                <i class="ph ph-calendar"></i>
                <span>Citas</span>
            </button>
            <button class="nav-item" data-target="finances">
                <i class="ph ph-wallet"></i>
                <span>Finanzas</span>
            </button>
            <button class="nav-item" data-target="calendar">
                <i class="ph ph-calendar-dots"></i>
                <span>Agenda</span>
            </button>
        </nav>
    </div>

    <!-- Modals -->
    <!-- Client Modal -->
    <div id="modal-client" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuevo Cliente</h3>
                <button class="close-btn" onclick="app.hideModal('modal-client')"><i class="ph ph-x"></i></button>
            </div>
            <form id="form-client" onsubmit="app.submitClient(event)">
                <div class="form-group">
                    <label>Nombre del Dueño</label>
                    <input type="text" id="client-name" required placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Teléfono (WhatsApp)</label>
                    <input type="tel" id="client-phone" required placeholder="Ej: +549112345678">
                </div>
                <div class="form-group">
                    <label>Nombre de la Mascota</label>
                    <input type="text" id="client-pet-name" required placeholder="Ej: Firulais">
                </div>
                <div class="form-group">
                    <label>Raza / Tipo</label>
                    <input type="text" id="client-pet-type" required placeholder="Ej: Caniche">
                </div>
                <div class="form-group">
                    <label>Detalles / Notas</label>
                    <textarea id="client-pet-details" rows="2" placeholder="Alergias, comportamiento..."></textarea>
                </div>
                <button type="submit" class="btn-primary btn-block">Guardar Cliente</button>
            </form>
        </div>
    </div>

    <!-- Appointment Modal -->
    <div id="modal-appointment" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nueva Cita</h3>
                <button class="close-btn" onclick="app.hideModal('modal-appointment')"><i class="ph ph-x"></i></button>
            </div>
            <form id="form-appointment" onsubmit="app.submitAppointment(event)">
                <div class="form-group">
                    <label>Cliente</label>
                    <select id="appointment-client" required>
                        <!-- Options generated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Servicio</label>
                    <input type="text" id="appointment-service" required placeholder="Ej: Baño y Corte">
                </div>
                <div class="form-group row-group">
                    <div>
                        <label>Fecha</label>
                        <input type="date" id="appointment-date" required>
                    </div>
                    <div>
                        <label>Hora</label>
                        <input type="time" id="appointment-time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Precio ($)</label>
                    <input type="text" id="appointment-price" required placeholder="$150.000">
                </div>
                <button type="submit" class="btn-primary btn-block">Agendar Cita</button>
            </form>
        </div>
    </div>

    <!-- Finance Modal -->
    <div id="modal-finance" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Registro Financiero</h3>
                <button class="close-btn" onclick="app.hideModal('modal-finance')"><i class="ph ph-x"></i></button>
            </div>
            <form id="form-finance" onsubmit="app.submitFinance(event)">

                <div class="form-group">
                    <label>Tipo</label>
                    <select id="finance-type" required>
                        <option value="ingreso">Ingreso (+)</option>
                        <option value="gasto">Gasto (-)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Monto ($)</label>
                    <input type="text" id="finance-amount" required placeholder="$150.000">
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="finance-description" required placeholder="Ej: Venta de shampoo">
                </div>

                <button type="submit" class="btn-primary btn-block">
                    Guardar Movimiento
                </button>

            </form>
        </div>
    </div>

    <!-- Notifications Toast -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>

</html>
